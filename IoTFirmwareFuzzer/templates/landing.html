<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IoT Fuzzer - Landing</title>
  <style>
    :root {
      --cyan: #22d3ee;
      --violet: #a78bfa;
      --bg: #050510;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --panel: rgba(12, 18, 32, 0.72);
      --border: rgba(56, 189, 248, 0.28);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
      color: var(--text);
      min-height: 100vh;
      background:
        radial-gradient(circle at 20% 20%, rgba(34, 211, 238, 0.18), transparent 40%),
        radial-gradient(circle at 80% 15%, rgba(167, 139, 250, 0.16), transparent 35%),
        linear-gradient(180deg, #050510, #090d18 40%, #06080f);
      overflow-x: hidden;
    }
    .bg-grid::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(34, 211, 238, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(34, 211, 238, 0.05) 1px, transparent 1px);
      background-size: 52px 52px;
      opacity: 0.32;
      pointer-events: none;
    }
    .wrap { max-width: 1120px; margin: 0 auto; padding: 42px 24px; position: relative; z-index: 1; }
    .hero {
      border: 1px solid var(--border);
      background: var(--panel);
      border-radius: 20px;
      padding: 40px 28px;
      box-shadow: 0 0 18px rgba(34, 211, 238, 0.09);
    }
    .tag { color: var(--muted); letter-spacing: .16em; font-size: .78rem; text-transform: uppercase; }
    h1 {
      margin-top: 10px;
      font-size: 2.25rem;
      line-height: 1.2;
      background: linear-gradient(90deg, var(--cyan), var(--violet));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .desc { margin-top: 14px; color: #cbd5e1; max-width: 760px; line-height: 1.7; }
    .actions { margin-top: 24px; display: flex; gap: 12px; flex-wrap: wrap; }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 11px 18px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 600;
      border: 1px solid transparent;
      transition: transform .15s;
      cursor: pointer;
    }
    .btn:hover { transform: translateY(-1px); }
    .btn-primary {
      color: #fff;
      background: linear-gradient(135deg, #0891b2, #6366f1);
      box-shadow: 0 3px 12px rgba(34, 211, 238, 0.18);
    }
    .btn-ghost {
      color: #dbeafe;
      border-color: var(--border);
      background: rgba(0, 0, 0, 0.35);
    }
    .grid {
      margin-top: 22px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
    }
    .card {
      border: 1px solid var(--border);
      background: rgba(2, 8, 20, 0.65);
      border-radius: 14px;
      padding: 14px;
    }
    .card h3 { font-size: .95rem; color: #a5f3fc; margin-bottom: 6px; }
    .card p { font-size: .85rem; color: #94a3b8; line-height: 1.55; }
  </style>
</head>
<body class="bg-grid">
  <div class="wrap">
    <section class="hero">
      <div class="tag">IoT Firmware Security · Graduation Project</div>
      <h1>IoT 固件协议灰盒模糊测试平台</h1>
      <p class="desc">
        该平台支持设备仿真、协议感知变异、覆盖率反馈、崩溃分析与报告展示。点击进入控制台可进行设备搭建、模糊测试以及结果查看；并内置示例按钮，便于答辩现场快速演示完整流程。
      </p>
      <div class="actions">
        <a class="btn btn-primary" href="/console">进入控制台</a>
        <a class="btn btn-ghost" href="/console#tab-device">演示设备搭建</a>
        <a class="btn btn-ghost" href="/console#tab-fuzz">演示模糊测试</a>
      </div>
      <div class="grid">
        <div class="card">
          <h3>搭建的设备</h3>
          <p>启动 QEMU 设备、查看命令行、输入交互命令、实时查看进程日志与状态。</p>
        </div>
        <div class="card">
          <h3>模糊测试</h3>
          <p>协议与架构参数配置、启动/停止测试、查看执行速度、崩溃数量与运行时长。</p>
        </div>
        <div class="card">
          <h3>结果报告</h3>
          <p>自动聚合崩溃信息并生成 HTML 报告，支持在答辩时直接展示漏洞触发效果。</p>
        </div>
      </div>
    </section>
  </div>
</body>
</html>
